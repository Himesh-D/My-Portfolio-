<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Himesh</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="blob-cont">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="nav-wrap">
    <nav class="nav">
      <a class="logo" href="index.html">Himesh<span>.</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a class="active" href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="page-grid" style="align-items: center;">
      <div class="reveal">
        <h1 class="section-title">Let's <span>Talk</span></h1>
        <p class="lead">Ready to bring your ideas to life? Fill out the form or drop an email. Let's create something
          extraordinary together.</p>

        <div class="social-links">
          <a href="https://github.com/Himesh-D" target="_blank" class="social-icon" aria-label="GitHub">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
              </path>
            </svg>
          </a>
          <a href="https://www.linkedin.com/in/desetty-himesh" target="_blank" class="social-icon"
            aria-label="LinkedIn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
              <rect x="2" y="9" width="4" height="12"></rect>
              <circle cx="4" cy="4" r="2"></circle>
            </svg>
          </a>
        </div>
      </div>
      <section class="card reveal" style="transition-delay: 200ms;">
        <form class="form" action="mailto:himeshdesetty@gmail.com?subject=Portfolio%20Contact" method="POST"
          enctype="text/plain">
          <div class="input-group">
            <input type="text" name="name" placeholder="Your Name" required />
          </div>
          <div class="input-group">
            <input type="email" name="email" placeholder="Email Address" required />
          </div>
          <div class="input-group">
            <textarea rows="5" name="message" placeholder="Tell me about your project..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Send Message</button>
        </form>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
